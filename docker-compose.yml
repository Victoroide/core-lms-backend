# docker-compose.yml -- Core LMS Backend
#
# This compose file is intended for LOCAL DEVELOPMENT and TEST execution only.
# For production deployments, use a managed PostgreSQL service (NeonDB) and
# run migrations manually via CI/CD: python manage.py migrate
# Do not use docker-compose in production.

services:
  db:
    image: postgres:15
    # Ephemeral storage: test database starts clean on every docker compose up.
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - lms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core_lms.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      DJANGO_ENV: test
    depends_on:
      db:
        condition: service_healthy
      axiom-engine:
        condition: service_healthy
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  axiom-engine:
    build:
      context: ../../../go/axiom-reasoning-svc
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_S3_REGION_NAME}
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  lms_network:
    driver: bridge
