services:
  db:
    image: postgres:15
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - lms_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core_lms.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - lms_network

  axiom-engine:
    image: busybox
    command: sh -c "echo 'AxiomEngine placeholder -- set AXIOM_ENGINE_URL to real host' && sleep infinity"
    networks:
      - lms_network

volumes:
  db_data:

networks:
  lms_network:
    driver: bridge
